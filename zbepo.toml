# kalamine keyboard layout descriptor
name        = "zBépo"                          # full layout name, displayed in the keyboard settings
name8       = "zbepo"                          # short Windows filename: no spaces, no special chars (≤ 8)
locale      = "fr"                             # locale/language id (BCP-47)
variant     = "zbepo"                          # layout variant id
author      = "zelmano"                        # author name
description = "Variante personnelle du bépo, avec chiffres en base et symboles de programmation en shift."
url         = "https://github.com/zelmano/zbepo"
version     = "0.5.0"
geometry    = "ISO"

